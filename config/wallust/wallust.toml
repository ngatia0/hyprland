# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# wallust configuration - for wallust version 3.0
# https://explosion-mental.codeberg.page/wallust/parameters/palette.html


# ───────── Backend ─────────
backend = "fast-resize"        # best balance
color_space = "lab"

# ✅ Alpha (opacity feel)
# ✅ Contrast (dark depth)
# ✅ Saturation (color richness)
# ✅ Vibrance (accent boost only)
alpha = 100
contrast = 100
saturation = 70
vibrance = 50
threshold = 20

fallback_generator = "complementary"
palette = "salience"

# ───────── Templates ─────────
#templates = 1
check_contrast = true

#check_contrast = 1


[templates]
#cava.template = 'colors-cava'
#cava.target = '~/.config/cava/config'

hypr.template = 'colors-hyprland.conf'
hypr.target = '~/.config/hypr/wallust/wallust-hyprland.conf'

rofi.template = 'colors-rofi.rasi'
rofi.target = '~/.config/hypr/wallust/colors-rofi.rasi'

waybar.template = 'colors-waybar.css'
waybar.target = '~/.config/hypr/wallust/colors-waybar.css'

#kitty.template = 'colors-kitty.conf'
#kitty.target = '~/.config/hypr/wallust/01-Wallust.conf'

#ghostty.template = 'colors-ghostty.conf'
#ghostty.target = '~/.config/hypr/wallust/wallust.conf'

#quickshell.template = 'qml_color.json'
#quickshell.target = '~/.config/hypr/wallust/qml_color.json'

#swaync.template = 'colors-swaync.css'
#swaync.target = '~/.config/hypr/wallust/colors-swaync.css'


dunst.template = "dunstrc"
dunst.target = "~/.config/dunst/dunstrc"

foot.template = "foot.ini"
foot.target = "~/.config/foot/foot.ini"


fuzzel.template = "colors-fuzzel.ini"
fuzzel.target = "~/.config/fuzzel/fuzzel.ini"
#ags.template = "ags-style.css"
#ags.target = "~/.config/ags/style.css"

#macchina.template = 'colors-macchina.toml'
#macchina.target = '~/.config/macchina/themes/wallust.toml'

#wezterm.template = 'colors-wezterm.toml'
#wezterm.target = '~/.config/wezterm/colors/wallust.toml'

#lite-xl.template = "init.lua"
#lite-xl.target = "~/.config/lite-xl/init.lua"



# Palette
# Uses the colors gathered from color_space in a way that makes sense, resulting in a scheme palette.
#
# Name	Description
# ansidark	Dark ansi colors, works best with lchansi and orders it’s colors to preserve a constant tty like order: color0 -> black, color1 -> redish, color2 -> greenish, and so on.
# dark	Dark colors dark background and light contrast. (16, comp, comp16)
# harddark	Same as dark with hard hue colors. (16, comp, comp16)
# light	Light bg dark fg. (16, comp, comp16)
# softdark	Variant of softlight uses the lightest colors and a dark background could be interpreted as dark inversed. (16, comp, comp16)
# softlight	Light with soft pastel colors counterpart of harddark. (16, comp, comp16)
# Palette
 # since you use glass/dark
#palette = "dark"
# HardDarkComp16
# SalienceDarkDistributed16

# ───────── Color Strategy ─────────

# How the image is parse, in order to get the colors:
# full - resized - wal - thumb -  fastresize - kmeans
#backend = "kmeans"

# What color space to use to produce and select the most prominent colors:
# lab - labmixed - lch - lchmixed

# NOTE: All filters will fill 16 colors (from color0 to color15), 16 color
#       variations are the 'ilusion' of more colors by opaquing color1 to color5.
# Use the most prominent colors in a way that makes sense, a scheme:
#  * dark        - 8 dark colors, dark background and light contrast
#  * dark16      - Same as `dark` but uses the 16 colors trick
#  * harddark    - Same as `dark` with hard hue colors
#  * harddark16  - Harddark with 16 color variation
#  * light       - Light bg, dark fg
#  * light16     - Same as `light` but uses the 16 color trick
#  * softdark    - Variant of softlight, uses the lightest colors and a dark
#                   background (could be interpreted as `dark` inversed)
#  * softdark16  - softdark with 16 color variation
#  * softlight   - Light with soft pastel colors, counterpart of `harddark`
#  * softlight16 - softlight with 16 color variation
#palette = "dark16"

# Difference between similar colors, used by the colorspace:
#  1          Not perceptible by human eyes.
#  1 - 2      Perceptible through close observation.
#  2 - 10     Perceptible at a glance.
#  11 - 49    Colors are more similar than opposite
#  100        Colors are exact opposite
#threshold = 11


