[main]
font=sans:size=21
line-height=55
letter-spacing=3
image-size-ratio=1.6

anchor=center
prompt="🚀 "
lines=10
width=20
auto-select
exit-on-lost-focus=yes
fields=name,generic,exec,categories
exit-on-lost-focus=yes
icon-theme=Adwaita
terminal=foot # or your preferred terminal
vertical-pad=15
horizontal-pad=48
layer=overlay
keyboard-focus=on-demand
[colors]
background={{background | strip}}dd
text={{foreground | strip}}ff
match={{color1 | strip}}ff
selection={{foreground | strip}}ff
selection-text={{background | strip}}ff
selection-match={{color8 | strip}}ff
border={{color5 | strip}}ff

prompt={{color3 | strip}}ff
placeholder={{color7 | strip}}ff
input={{color10 | strip}}ff
counter={{color6 | strip}}ff

[border]
width=2
radius=10






